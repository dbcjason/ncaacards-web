name: Sync Payload Indexes

on:
  workflow_dispatch:
    inputs:
      years:
        description: "Years to sync (e.g. 2026 or 2019-2026)"
        required: true
        default: "2026"
      genders:
        description: "Comma-separated genders to sync"
        required: true
        default: "men,women"
      storage:
        description: "Primary storage target for synced payloads"
        required: true
        default: "supabase"
  schedule:
    - cron: "30 9 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub payload indexes into Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          YEARS: ${{ github.event.inputs.years || '2026' }}
          GENDERS: ${{ github.event.inputs.genders || 'men,women' }}
          PAYLOAD_PRIMARY_STORAGE: ${{ github.event.inputs.storage || 'supabase' }}
        run: node scripts/sync-player-payload-indexes.mjs
